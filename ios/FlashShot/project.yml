name: FlashShot
options:
  bundleIdPrefix: com.flashshot
  developmentLanguage: zh-Hans
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: NWUL4BPF68
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
targets:
  FlashShot:
    type: application
    platform: iOS
    sources:
      - path: FlashShot
    resources:
      - path: FlashShot/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.flashshot.app
        INFOPLIST_FILE: FlashShot/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: FlashShot/Resources/FlashShot.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
  FlashShotTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FlashShotTests
      - path: StoreKit/FlashShot.storekit
        buildPhase: resources
    dependencies:
      - target: FlashShot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.flashshot.app.tests
        GENERATE_INFOPLIST_FILE: YES
  FlashShotUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FlashShotUITests
    dependencies:
      - target: FlashShot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.flashshot.app.uitests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  FlashShot:
    build:
      targets:
        FlashShot: all
        FlashShotTests: [test]
    run:
      config: Debug
      storeKitConfiguration: StoreKit/FlashShot.storekit
    test:
      config: Debug
      storeKitConfiguration: StoreKit/FlashShot.storekit
      targets:
        - FlashShotTests
        - FlashShotUITests
    archive:
      config: Release
